<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Koin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Both html and body must be transparent so that the rounded
           corners of .frame show through the Tauri transparent window */
        html, body {
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
        }

        /* This div IS the visible "window", rounded corners clip the background */
        .frame {
            width: 100%;
            height: 100%;
            background: oklch(0.2174 0.0019 106.5582);
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-user-select: none;
            user-select: none;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            animation: fade-in 0.2s ease-out;
        }

        .spinner {
            width: 28px;
            height: 28px;
            stroke: #B09566;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
